name: Build Face Recognition APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.8

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git wget unzip zip ccache autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
          libjpeg-dev libfreetype6-dev liblcms2-dev libwebp-dev tcl8.6-dev tk8.6-dev \
          python3-tk libharfbuzz-dev libfribidi-dev libx11-dev libxext-dev \
          libxrender-dev libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev \
          libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev libxkbcommon-dev \
          libxkbcommon-x11-dev libgl1-mesa-dev libgles2-mesa-dev libdrm-dev \
          libgbm-dev libasound2-dev libpulse-dev libdbus-1-dev libudev-dev \
          libibus-1.0-dev libxi-dev libxtst-dev openjdk-17-jdk libtinfo5 \
          autoconf automake

    - name: Install Cython and buildozer
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33
        pip install buildozer

    - name: Fix buildozer Android SDK issue
      run: |
        # إنشاء مجلد .buildozer
        mkdir -p ~/.buildozer/android/platform
        
        # إنشاء مجلد android-sdk بالهيكل الصحيح
        SDK_PATH=~/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_PATH
        
        # تحميل Android SDK command line tools
        cd $SDK_PATH
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        # إنشاء الهيكل المطلوب
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools/latest 2>/dev/null || true
        mkdir -p cmdline-tools/latest
        mv bin lib cmdline-tools/latest/ 2>/dev/null || true
        
        # إضافة التراخيص
        mkdir -p licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> licenses/android-sdk-license
        
        # إنشاء الرابط المطلوب لـ buildozer
        mkdir -p tools/bin
        ln -sf $SDK_PATH/cmdline-tools/latest/bin/sdkmanager tools/bin/sdkmanager
        ln -sf $SDK_PATH/cmdline-tools/latest/bin/avdmanager tools/bin/avdmanager
        
        # تثبيت المكونات المطلوبة
        yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_PATH "platform-tools" "platforms;android-31" "build-tools;30.0.3"
        
        # تعيين متغيرات البيئة
        echo "ANDROID_HOME=$SDK_PATH" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$SDK_PATH" >> $GITHUB_ENV
        echo "$SDK_PATH/tools/bin" >> $GITHUB_PATH
        echo "$SDK_PATH/platform-tools" >> $GITHUB_PATH
        echo "$SDK_PATH/cmdline-tools/latest/bin" >> $GITHUB_PATH

    - name: Download Android NDK manually
      run: |
        NDK_PATH=~/.buildozer/android/platform/android-ndk-r25b
        if [ ! -d "$NDK_PATH" ]; then
          echo "📥 تحميل Android NDK r25b..."
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          mv android-ndk-r25b $NDK_PATH
        fi

    - name: Clean previous builds
      run: |
        rm -rf ~/.buildozer/android/platform/build-*
        rm -rf bin/*

    - name: Build with buildozer
      run: |
        # تشغيل buildozer مع خيارات إضافية
        buildozer android debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: face-recognition-app
        path: bin/*.apk
        if-no-files-found: warn
