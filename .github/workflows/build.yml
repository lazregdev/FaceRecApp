name: Build Face Recognition APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.8

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git \
          wget \
          unzip \
          zip \
          ccache \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          libjpeg-dev \
          libfreetype6-dev \
          liblcms2-dev \
          libwebp-dev \
          tcl8.6-dev \
          tk8.6-dev \
          python3-tk \
          libharfbuzz-dev \
          libfribidi-dev \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxcb1-dev \
          libxcb-shm0-dev \
          libxcb-xfixes0-dev \
          libxcb-randr0-dev \
          libxcb-shape0-dev \
          libxcb-sync-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libdrm-dev \
          libgbm-dev \
          libasound2-dev \
          libpulse-dev \
          libdbus-1-dev \
          libudev-dev \
          libibus-1.0-dev \
          libxi-dev \
          libxtst-dev \
          openjdk-17-jdk \
          libtinfo5

    - name: Install Cython and buildozer
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33
        pip install buildozer

    - name: Set up Android SDK manually
      run: |
        # إنشاء المجلدات المطلوبة
        SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p $SDK_ROOT
        cd $SDK_ROOT
        
        # تحميل command line tools
        echo "📥 تحميل Android command line tools..."
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        # عرض محتويات المجلد للتشخيص
        echo "📂 محتويات المجلد بعد فك الضغط:"
        ls -la
        
        # إنشاء هيكل المجلدات الصحيح - الطريقة الصحيحة
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        # إضافة إلى PATH
        export PATH=$PATH:$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/platform-tools
        
        # التحقق من وجود sdkmanager
        echo "🔍 البحث عن sdkmanager:"
        find $SDK_ROOT -name "sdkmanager" -type f 2>/dev/null || echo "❌ لم يتم العثور على sdkmanager"
        
        # الموافقة على التراخيص
        echo "📝 الموافقة على التراخيص..."
        mkdir -p licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > licenses/android-googletv-license
        
        # استخدام المسار المباشر لـ sdkmanager
        SDKMANAGER_PATH="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
        
        if [ -f "$SDKMANAGER_PATH" ]; then
          echo "✅ تم العثور على sdkmanager في: $SDKMANAGER_PATH"
          echo "📦 تثبيت platform-tools و build-tools..."
          yes | $SDKMANAGER_PATH --sdk_root=$SDK_ROOT "platform-tools" "platforms;android-31" "build-tools;30.0.3"
        else
          echo "❌ لم يتم العثور على sdkmanager في المسار المتوقع!"
          echo "🔍 البحث مرة أخرى..."
          SDKMANAGER_PATH=$(find $SDK_ROOT -name "sdkmanager" -type f | head -1)
          if [ -n "$SDKMANAGER_PATH" ]; then
            echo "✅ تم العثور على sdkmanager في: $SDKMANAGER_PATH"
            echo "📦 تثبيت platform-tools و build-tools..."
            yes | $SDKMANAGER_PATH --sdk_root=$SDK_ROOT "platform-tools" "platforms;android-31" "build-tools;30.0.3"
          else
            echo "❌ فشل في العثور على sdkmanager!"
            exit 1
          fi
        fi
        
        echo "✅ تم تثبيت Android SDK بنجاح"

    - name: Accept Android SDK licenses (backup)
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

    - name: Build with buildozer
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: face-recognition-app
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30
